services:
  mongodb:
    image: mongo:7
    container_name: acms-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: certificate_management
    volumes:
      - mongo_data:/data/db
      - ../database/mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro

  backend:
    build:
      context: ../backend
    container_name: acms-backend
    restart: unless-stopped
    env_file:
      - ../backend/.env.example
    environment:
      MONGO_URI: mongodb://mongodb:27017/certificate_management
    ports:
      - "8000:8000"
    depends_on:
      - mongodb

  frontend:
    build:
      context: ../frontend
      args:
        VITE_API_BASE_URL: /api
    container_name: acms-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  mongo_data:
